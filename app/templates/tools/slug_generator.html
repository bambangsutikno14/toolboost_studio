{% extends "base.html" %}
{% block title %}Slug Generator - {{ site_name }}{% endblock %}
{% block content %}
<h1>Slug Generator</h1>
<form method="post" class="tool-form"><label>Title</label><input name="text" value="{{ text }}" placeholder="Example: Best Free SEO Tools for Small Business"><button type="submit">Generate Slug</button></form>
{% if result %}<div class="result"><h2>Result</h2><p class="copybox">{{ result }}</p></div>{% endif %}
<section class="content"><h2>Clean URL tips</h2><p>Keep slugs short, lowercase, and readable.</p></section>
{% endblock %}

{% extends "base.html" %}
{% block title %}UTM Builder - {{ site_name }}{% endblock %}
{% block content %}
<h1>UTM Builder</h1>
<form method="post" class="tool-form">
<label>URL</label><input name="url" value="{{ form.get('url','') }}" placeholder="https://example.com/page">
<label>Source</label><input name="source" value="{{ form.get('source','') }}" placeholder="google">
<label>Medium</label><input name="medium" value="{{ form.get('medium','') }}" placeholder="organic">
<label>Campaign</label><input name="campaign" value="{{ form.get('campaign','') }}" placeholder="summer_launch">
<label>Term optional</label><input name="term" value="{{ form.get('term','') }}">
<label>Content optional</label><input name="content" value="{{ form.get('content','') }}">
<button type="submit">Build URL</button></form>
{% if result %}<div class="result"><h2>Hasil</h2><p class="copybox">{{ result }}</p></div>{% endif %}
<section class="content"><h2>Tips UTM</h2><p>Gunakan nama campaign konsisten agar data analytics mudah dibaca.</p></section>
{% endblock %}

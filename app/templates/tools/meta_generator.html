{% extends "base.html" %}
{% block title %}Meta Description Generator - {{ site_name }}{% endblock %}
{% block content %}
<h1>Meta Description Generator</h1>
<form method="post" class="tool-form"><label>Keyword / topik halaman</label><input name="keyword" value="{{ keyword }}" placeholder="example: free invoice generator"><button type="submit">Generate</button></form>
{% if result %}<div class="result"><h2>Hasil</h2><p class="copybox">{{ result }}</p></div>{% endif %}
<section class="content"><h2>Tips meta description</h2><p>Jelaskan manfaat halaman secara singkat dan akurat.</p></section>
{% endblock %}
